<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My First Project</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Hello, World! 👋</h1>
      <p class="subtitle">Welcome to your first coding project.</p>

      <div class="card">
        <h2>My To-Do List</h2>
        <div class="input-row">
          <input id="todo-input" type="text" placeholder="Add a new task..." />
          <button onclick="addTodo()">Add</button>
        </div>
        <ul id="todo-list"></ul>
      </div>

      <p class="tip">
        Tip: Open <strong>index.html</strong> in your browser to see this page.
        Edit the files to make it your own!
      </p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
